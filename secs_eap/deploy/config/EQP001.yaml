equipment:
  name: "EQP001"
  host: "0.0.0.0"
  port: 5000
  mode: "passive"
  device_id: 0

message_handler: {}

mes_mq:
  enabled: true
  mq_conn_list:
    QM1: "MESDEVGW1/MESDEVGW1.SVRCONN/95.40.166.36(51419)"
    QM2: "MESDEVGW2/MESDEVGW2.SVRCONN/95.40.166.36(51420)"
  mq_listener:
    MQ1: "QM1/F01.TCS.SHARE/E_CLN_01"
    MQ2: "QM2/F01.TCS.SHARE/E_CLN_01"
  mq_sender:
    MQ1: "QM1"
  timeout_ms: 5000

business_logic:
  collection_events:
    id_types:
      data_id: U4
      ceid: U4
      rptid: U4
      vid: U4
    report_setup:
      clear_data_id: 0
      define_data_id: 1
      link_data_id: 1
      enable_mode: selected 
    variables:
      303:
        name: lp_id
      310:
        name: carrier_id
      313:
        name: slot_map
      281:
        name: control_job_id
      283:
        name: process_job_id
      1000:
        name: online_state
    reports:
      8701:
        name: load_port_state
        vids: [303]
      8702:
        name: carrier_waiting_host
        vids: [310, 303]
      8703:
        name: carrier_slot_map_waiting_host
        vids: [310, 303, 313]
      1002:
        name: carrier_waiting_for_host
        vids: [303, 310]
      9401:
        name: control_job_state
        vids: [281]
      4001:
        name: process_job_state
        vids: [283]
      1000:
        name: online_state_report
        vids: [1000]
    events:
      101:
        name: online_local
        reports: [1000]
      100:
        name: offline
        reports: [1000]
      102:
        name: online_remote
        reports: [1000]
      200:
        name: carrier_arrived
        reports: [8701]
      136:
        name: carrier_waiting_for_host
        reports: [1002]
      222:
        name: slot_map_waiting_for_host
        reports: [8703]
      702:
        name: control_job_executing
        reports: [9401]
      602:
        name: process_job_processing
        reports: [4001]
  workflows:
    - name: "s6f11_online_local_setup_reports"
      trigger:
        sf: "S6F11"
        event_name: ["online_local", "offline"]
      steps:
        - action: "mes_apceqpst"
          transaction:
            trx_id: "APCEQPST"
            type_id: "I"
            eqpt_id: "E_CLN_01"
            user_id: "IBM"
            eqpt_mode: "MANU"
            orig_opi_flg: "N"
            clm_eqst_typ: "A"
            eqpt_stat: ""
    - name: "s6f11_online_remote_setup_reports"
      trigger:
        sf: "S6F11"
        event_name: "online_remote"
        online_state: 5
      steps:
        - action: "configure_collection_events"
        - action: "mes_apceqpst"
          transaction:
            trx_id: "APCEQPST"
            type_id: "I"
            eqpt_id: "E_CLN_01"
            user_id: "IBM"
            eqpt_mode: "AUTO"
            orig_opi_flg: "N"
            clm_eqst_typ: "A"
            eqpt_stat: ""
    - name: "s6f11_then_query_mes_apvryope"
      trigger:
        sf: "S6F11"
        ceid: 136
      steps:
        - action: "mes_apvryope"
          transaction:
            trx_id: "APVRYOPE"
            type_id: "I"
            eqpt_id: "E_CLN_01"
            port_id: "${lp_id}"
            crr_id: "${carrier_id}"
            user_id: "IBM"
